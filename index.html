<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="content">0</div>
        <div class="btn-container">
            <button data-value="+" class="keys operator">+</button>
            <button data-value="-" class="keys operator">-</button>
            <button data-value="*" class="keys operator">×</button>
            <button data-value="/" class="keys operator">÷</button>
            <button data-value="7" class="keys">7</button>
            <button data-value="8" class="keys">8</button>
            <button data-value="9" class="keys">9</button>
            <button data-value="4" class="keys">4</button>
            <button data-value="5" class="keys">5</button>
            <button data-value="6" class="keys">6</button>
            <button data-value="1" class="keys">1</button>
            <button data-value="2" class="keys">2</button>
            <button data-value="3" class="keys">3</button>
            <button data-value="0" class="keys btn-0">0</button>
            <button data-value="C" class="keys">C</button>
            <button data-value="=" class="keys btn-enter">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
